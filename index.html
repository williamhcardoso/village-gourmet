  if (!temQtd || total === 0) return { total: 0, mb: 0, ml: 0, pmin: 0, pdes: 0, calculado: false };
  const mb = (ficha.p - total) / ficha.p;
  const ml = (ficha.p - total - ficha.p * ficha.a) / ficha.p;
  const pmin = total / (1 - ficha.m - ficha.a);
  const pdes = total / (1 - (ficha.m + 0.05) - ficha.a);
  return { total, mb, ml, pmin, pdes, calculado: true };
}

function fmt2(v) { return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmt4(v) { return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 4, maximumFractionDigits: 4 }); }
function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }
function fmtTime(d) { return d ? d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : '--:--'; }

// ─── COMPONENTE: INSUMO ROW ───────────────────────────────────────────────────
function InsumoRow({ ins, sv, updateInsumo }) {
  const preco = parseFloat(sv.preco) || 0;
  const unid = sv.unid || ins.u;
  const isCaixa = unid === 'caixa';
  const qtdCx = parseInt(sv.qtd_caixa) || 0;
  const fator = isCaixa ? (qtdCx || ins.f) : ins.f;
  const cu = preco > 0 && fator > 0 ? preco / fator : 0;
  const filled = preco > 0;

  const inpStyle = {
    border:'1px solid #ddd', borderRadius:6, padding:'7px 10px', fontSize:16,
    background:'#fafafa', width:'100%', color:'#0f0f0f',
  };
  const selStyle = { ...inpStyle, appearance:'none', WebkitAppearance:'none', paddingRight:8 };

  return (
    <div style={{
      padding:'12px 16px', borderBottom:'1px solid #f0ede9',
      background: filled ? '#f0faf4' : '#fff',
    }}>
      <div style={{ fontWeight:600, fontSize:14, marginBottom:8, color:'#0f0f0f' }}>{ins.n}</div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom: isCaixa ? 8 : 0 }}>
        <div>
          <div style={{ fontSize:11, color:'#888', marginBottom:3 }}>Preço de Compra (R$)</div>
          <input
            type="number" inputMode="decimal" step="0.01" min="0"
            placeholder="0,00"
            value={sv.preco || ''}
            onChange={e => {
              const v = e.target.value;
              if (v === '' || /^\d*\.?\d{0,2}$/.test(v)) updateInsumo(ins.id, 'preco', v);
            }}
            style={inpStyle}
          />
        </div>
        <div>
          <div style={{ fontSize:11, color:'#888', marginBottom:3 }}>Unidade de Compra</div>
          <select value={unid} onChange={e => updateInsumo(ins.id, 'unid', e.target.value)} style={selStyle}>
            {UNID_COMPRA.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
        </div>
      </div>
      {isCaixa && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:6 }}>
          <div>
            <div style={{ fontSize:11, color:'#888', marginBottom:3 }}>Qtd por Caixa (un)</div>
            <input
              type="number" inputMode="numeric" min="1"
              placeholder={String(ins.f)}
              value={sv.qtd_caixa || ''}
              onChange={e => updateInsumo(ins.id, 'qtd_caixa', e.target.value)}
              style={inpStyle}
            />
          </div>
          <div style={{ display:'flex', alignItems:'flex-end', paddingBottom:8 }}>
            {preco > 0 && qtdCx > 0 && (
              <span style={{ fontSize:12, color:'#1e8449', fontWeight:600 }}>
                {fmt2(preco / qtdCx)}/un
              </span>
            )}
          </div>
        </div>
      )}
      {cu > 0 && (
        <div style={{ fontSize:12, color:'#888', marginTop:2 }}>
          Custo por {ins.b}: <strong style={{ color:'#0f0f0f' }}>{fmt2(cu)}</strong>
        </div>
      )}
    </div>
  );
}

// ─── COMPONENTE: INSUMOS GROUP ────────────────────────────────────────────────

  const [open, setOpen] = useState(true);
  const filled = insumos.filter(ins => parseFloat((stateInsumos[ins.id] || {}).preco) > 0).length;
  const groupIcons = { CARNES:'🥩', PAES:'🍞', LATICINIOS:'🧀', OUTROS:'🥔', CERVEJAS_600:'🍺', LONG_NECKS:'🍻', NAO_ALCOOLICOS:'🥤', DRINKS:'🍹' };
  return (
    <div style={{ marginBottom:2 }}>
      <button onClick={() => setOpen(o => !o)} style={{
        width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'12px 16px', background:'#f0ede9', border:'none', cursor:'pointer',
        textAlign:'left',
      }}>
        <span style={{ fontWeight:700, fontSize:13, letterSpacing:.5 }}>
          {groupIcons[grupo] || '📦'} {grupo}
        </span>
        <span style={{ fontSize:12, color:'#888', display:'flex', alignItems:'center', gap:8 }}>
          <span style={{
            padding:'2px 8px', borderRadius:10,
            background: filled === insumos.length ? '#d4edda' : '#fff',
            color: filled === insumos.length ? '#155724' : '#666',
            fontWeight:600,
          }}>{filled}/{insumos.length}</span>
          <span style={{ fontSize:14, transition:'transform .2s', display:'inline-block', transform: open ? 'rotate(90deg)' : 'rotate(0)' }}>›</span>

        <div className="insumos-grid">
          {insumos.map(ins => (
            <InsumoRow key={ins.id} ins={ins} sv={stateInsumos[ins.id] || {}} updateInsumo={updateInsumo} />
          ))}
        </div>
      )}

  );
}

// ─── COMPONENTE: INSUMOS TAB ──────────────────────────────────────────────────
function InsumosTab({ state, updateInsumo }) {
  const [search, setSearch] = useState('');
  const grupos = {};
  INSUMOS.forEach(ins => {
    if (!search || ins.n.toLowerCase().includes(search.toLowerCase())) {
      if (!grupos[ins.g]) grupos[ins.g] = [];
      grupos[ins.g].push(ins);
    }
  });
  return (
    <div>
      <div style={{ padding:'12px 16px', background:'#fff', borderBottom:'1px solid #f0ede9' }}>
        <input
          type="search" placeholder="Buscar insumo..." value={search}
          onChange={e => setSearch(e.target.value)}
          style={{
            width:'100%', padding:'9px 14px', border:'1px solid #ddd', borderRadius:8,
            fontSize:16, background:'#fafafa',
          }}
        />
      </div>
      {Object.entries(grupos).map(([g, insumos]) => (
        <InsumosGroup
          key={g} grupo={g} insumos={insumos}
          stateInsumos={state.insumos || {}} updateInsumo={updateInsumo}
        />
      ))}
      {Object.keys(grupos).length === 0 && (
        <div style={{ textAlign:'center', padding:40, color:'#aaa' }}>Nenhum insumo encontrado</div>
      )}
      <div style={{ height:16 }} />
    </div>
  );
}

// ─── COMPONENTE: INGREDIENTE ROW ──────────────────────────────────────────────

        value={si.unid || ing.u}

  );
}

// ─── COMPONENTE: FICHA CARD ───────────────────────────────────────────────────
function FichaCard({ fid, ficha, state, updateFicha }) {
  const [open, setOpen] = useState(false);
  const sf = (state.fichas || {})[fid] || {};
  const { total, mb, ml, pmin, pdes, calculado } = calcFicha(fid, state);

  const mbColor = calculado ? (mb >= ficha.m ? '#1e8449' : mb >= ficha.m - 0.05 ? '#c9973a' : '#c0392b') : '#aaa';

  const metricBox = (label, value, color) => (
    <div style={{ background:'#f8f6f3', borderRadius:6, padding:'8px 10px', textAlign:'center' }}>
      <div style={{ fontSize:10, color:'#888', marginBottom:2 }}>{label}</div>
      <div style={{ fontSize:14, fontWeight:700, color: color || '#0f0f0f' }}>{value}</div>
    </div>
  );

  return (
    <div style={{ margin:'0 0 2px', background:'#fff', borderBottom:'1px solid #f0ede9' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'12px 16px', background:'transparent', border:'none', cursor:'pointer', textAlign:'left',
      }}>
        <div>
          <div style={{ fontWeight:600, fontSize:14, color:'#0f0f0f' }}>{ficha.n}</div>
          <div style={{ fontSize:12, color:'#888', marginTop:2 }}>
            Venda: {fmt2(ficha.p)}
            {calculado && <span style={{ color: mbColor, marginLeft:8, fontWeight:600 }}>• MgB {fmtPct(mb)}</span>}
          </div>
        </div>
        <span style={{ fontSize:16, color:'#ccc', transition:'transform .2s', display:'inline-block', transform: open ? 'rotate(90deg)' : 'rotate(0)' }}>›</span>
      </button>
      {open && (
        <div>
          {calculado && (
            <div style={{ padding:'0 12px 12px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
              {metricBox('Custo Total', fmt2(total))}
              {metricBox('Margem Bruta', fmtPct(mb), mbColor)}
              {metricBox('Margem Líquida', fmtPct(ml), mb > 0 && ml > 0 ? '#1e8449' : '#c0392b')}
              {metricBox('Preço Mín. Viável', fmt2(pmin), pmin > ficha.p ? '#c0392b' : '#1e8449')}
            </div>
          )}
          <div style={{ background:'#fafafa', borderTop:'1px solid #f0ede9', borderBottom:'1px solid #f0ede9' }}>
            <div style={{ padding:'8px 12px 4px', fontSize:11, color:'#aaa', fontWeight:700, letterSpacing:.5 }}>
              INGREDIENTES — Nome | Qtd | Unid
            </div>
            {ficha.i.map((ing, ii) => (
              <IngRow key={ii} ing={ing} ii={ii} fid={fid} sf={sf} stateGlobal={state} updateFicha={updateFicha} />
            ))}
          </div>
          {calculado && (
            <div style={{ padding:'10px 16px', fontSize:12, color:'#666', display:'flex', gap:16 }}>
              <span>Custo: <strong>{fmt2(total)}</strong></span>
              <span>Mínimo: <strong style={{ color: pmin > ficha.p ? '#c0392b' : '#1e8449' }}>{fmt2(pmin)}</strong></span>
              <span>Desejável: <strong>{fmt2(pdes)}</strong></span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── COMPONENTE: FICHAS TAB ───────────────────────────────────────────────────
function FichasTab({ state, updateFicha }) {
  const [search, setSearch] = useState('');
  const [openGroups, setOpenGroups] = useState({
    CHOPP:true, HAMBURGUERES:true, COMBOS:true, BATATAS:true, PANQUECAS:true,
    CARNES:true, SOBREMESAS:true, PETISCOS:true, EXECUTIVOS:true, DRINKS:true,
    CERVEJAS_600:true, LONG_NECKS:true, SUCOS_AGUAS:true, REFRIGERANTES:true,
    ENERGETICOS:true, DESTILADOS:true, GUARNICOES:true, ADICIONAIS:true, SORTIDOS:true,
  });

  const toggleGroup = g => setOpenGroups(prev => ({ ...prev, [g]: !prev[g] }));

  const updateFichaIng = useCallback((fid, key, val) => {
    updateFicha(fid, key, val);
  }, [updateFicha]);

  const grupos = {};
  FIC.forEach((f, fid) => {
    if (!search || f.n.toLowerCase().includes(search.toLowerCase())) {
      if (!grupos[f.c]) grupos[f.c] = [];
      grupos[f.c].push({ f, fid });
    }
  });

  const catIcons = {
    CHOPP:'🍺', HAMBURGUERES:'🍔', COMBOS:'🍔', BATATAS:'🍟', PANQUECAS:'🥞',
    CARNES:'🥩', SOBREMESAS:'🍮', PETISCOS:'🍗', EXECUTIVOS:'🍽️',
    DRINKS:'🍹', CERVEJAS_600:'🍺', LONG_NECKS:'🍻',
    SUCOS_AGUAS:'💧', REFRIGERANTES:'🥤', ENERGETICOS:'⚡',
    DESTILADOS:'🥃', GUARNICOES:'🌿', ADICIONAIS:'➕', SORTIDOS:'🍬',
  };

  return (
    <div>
      <div style={{ padding:'12px 16px', background:'#fff', borderBottom:'1px solid #f0ede9' }}>
        <input
          type="search" placeholder="Buscar ficha ou produto..." value={search}
          onChange={e => setSearch(e.target.value)}
          style={{ width:'100%', padding:'9px 14px', border:'1px solid #ddd', borderRadius:8, fontSize:16, background:'#fafafa' }}
        />
      </div>
      {Object.entries(grupos).map(([g, items]) => {
        const calcCount = items.filter(({ fid }) => calcFicha(fid, state).calculado).length;
        return (
          <div key={g}>
            <button onClick={() => toggleGroup(g)} style={{
              width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'12px 16px', background:'#f0ede9', border:'none', cursor:'pointer', textAlign:'left',
            }}>
              <span style={{ fontWeight:700, fontSize:13, letterSpacing:.5 }}>
                {catIcons[g] || '📋'} {g}
              </span>
              <span style={{ fontSize:12, color:'#888', display:'flex', alignItems:'center', gap:8 }}>
                <span style={{
                  padding:'2px 8px', borderRadius:10,
                  background: calcCount === items.length ? '#d4edda' : '#fff',
                  color: calcCount === items.length ? '#155724' : '#666', fontWeight:600,
                }}>{calcCount}/{items.length}</span>
                <span style={{ fontSize:14, transition:'transform .2s', display:'inline-block', transform: openGroups[g] ? 'rotate(90deg)' : 'rotate(0)' }}>›</span>
              </span>
            </button>
            {openGroups[g] && items.map(({ f, fid }) => (
              <FichaCard key={fid} fid={fid} ficha={f} state={state} updateFicha={updateFichaIng} />
            ))}
          </div>
        );
      })}
      {Object.keys(grupos).length === 0 && (
        <div style={{ textAlign:'center', padding:40, color:'#aaa' }}>Nenhuma ficha encontrada</div>
      )}
      <div style={{ height:16 }} />
    </div>
  );
}

// ─── MODAL DE CONFIRMAÇÃO ─────────────────────────────────────────────────────
function ConfirmModal({ message, onConfirm, onCancel }) {
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:999, background:'rgba(0,0,0,0.5)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:24,
    }}>
      <div style={{ background:'#fff', borderRadius:12, padding:24, maxWidth:320, width:'100%', boxShadow:'0 8px 32px rgba(0,0,0,0.2)' }}>
        <div style={{ fontSize:15, color:'#0f0f0f', marginBottom:20, lineHeight:1.5 }}>{message}</div>
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={onCancel} style={{
            flex:1, padding:'12px 0', borderRadius:8, fontSize:14, fontWeight:600,
            background:'#f0ede9', color:'#333', border:'none', cursor:'pointer',
          }}>Não</button>
          <button onClick={onConfirm} style={{
            flex:1, padding:'12px 0', borderRadius:8, fontSize:14, fontWeight:700,
            background:'#c0392b', color:'#fff', border:'none', cursor:'pointer',
          }}>Descartar</button>
        </div>
      </div>
    </div>
  );
}

// ─── COMPONENTE: PIN SCREEN ───────────────────────────────────────────────────
const PIN = '4321';

function PinScreen({ onUnlock }) {
  const [digits, setDigits] = useState('');
  const [error, setError] = useState(false);

  const addDigit = (d) => {
    if (digits.length >= 4 || error) return;
    const next = digits + d;
    setDigits(next);
    if (next.length === 4) {
      if (next === PIN) {
        sessionStorage.setItem('vg_auth', '1');
        onUnlock();
      } else {
        setError(true);
        setTimeout(() => { setDigits(''); setError(false); }, 800);
      }
    }
  };

  const del = () => { if (!error) setDigits(d => d.slice(0, -1)); };

  const keys = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];

  return (
    <div style={{
      minHeight:'100vh', background:'#f5f2ee', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:24,
    }}>
      <div style={{ marginBottom:40, textAlign:'center' }}>
        <div style={{ fontSize:28, fontWeight:700, letterSpacing:-0.5 }}>
          Village <span style={{ color:'#c9973a' }}>Gourmet</span>
        </div>
        <div style={{ fontSize:13, color:'#888', marginTop:6 }}>Controle de Custos</div>
      </div>

      <div style={{ marginBottom:8, fontSize:13, color:'#888', fontWeight:500 }}>Digite o PIN</div>

      <div style={{ display:'flex', gap:18, marginBottom:10 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            width:14, height:14, borderRadius:'50%',
            background: digits.length > i ? (error ? '#c0392b' : '#c9973a') : '#ddd',
            transition:'background .15s',
          }} />
        ))}
      </div>

      <div style={{ height:20, marginBottom:16, textAlign:'center' }}>
        {error && <span style={{ fontSize:13, color:'#c0392b', fontWeight:600 }}>PIN incorreto</span>}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 76px)', gap:12 }}>
        {keys.map((k, i) => {
          if (k === '') return <div key={i} />;
          const isDel = k === '⌫';
          return (
            <button key={i} onClick={() => isDel ? del() : addDigit(String(k))} style={{
              height:76, borderRadius:38, fontSize: isDel ? 22 : 26, fontWeight:600,
              background: isDel ? 'transparent' : '#fff',
              color: isDel ? '#888' : '#0f0f0f',
              border: isDel ? 'none' : '1px solid #e9e6e1',
              boxShadow: isDel ? 'none' : '0 2px 8px rgba(0,0,0,0.07)',
              cursor:'pointer', WebkitTapHighlightColor:'transparent',
            }}>{k}</button>
          );
        })}
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App() {
  const [unlocked, setUnlocked] = useState(() => sessionStorage.getItem('vg_auth') === '1');
  const [state, setState] = useState(() => loadLS() || emptyState());
  const [savedState, setSavedState] = useState(() => loadLS() || emptyState());
  const [tab, setTab] = useState('insumos');
  const [syncStatus, setSyncStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const [dirty, setDirty] = useState(false);
  const [confirmCancel, setConfirmCancel] = useState(false);

  // Carregar do JSONBin na inicialização
  useEffect(() => {
    setSyncStatus('loading');
    fetch(API_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } })
      .then(r => r.json())
      .then(data => {
        if (data && data.record && data.record.vg) {
          const remote = data.record.vg;
          setState(remote);
          setSavedState(remote);
          saveLS(remote);
          setLastSync(new Date());
          setSyncStatus('synced');
        } else {
          setSyncStatus('idle');
        }
      })
      .catch(() => setSyncStatus('offline'));
  }, []);

  const handleSave = useCallback(() => {
    if (syncStatus === 'saving') return;
    setSyncStatus('saving');
    saveLS(state);
    setSavedState(state);
    setDirty(false);
    fetch(API_URL, {
      method: 'PUT',
      headers: { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ vg: state }),
    })
      .then(r => r.json())
      .then(() => { setLastSync(new Date()); setSyncStatus('synced'); })
      .catch(() => setSyncStatus('offline'));
  }, [state, syncStatus]);

  const handleCancel = useCallback(() => {
    if (!dirty) return;
    setConfirmCancel(true);
  }, [dirty]);

  const handleConfirmCancel = useCallback(() => {
    setState(savedState);
    setDirty(false);
    setConfirmCancel(false);
  }, [savedState]);

  const updateInsumo = useCallback((id, field, value) => {
    setState(prev => {
      const next = {
        ...prev,
        insumos: { ...prev.insumos, [id]: { ...(prev.insumos || {})[id], [field]: value } },
      };
      saveLS(next);
      return next;
    });
    setDirty(true);
  }, []);

  const updateFicha = useCallback((fid, key, val) => {
    setState(prev => {
      const next = {
        ...prev,
        fichas: { ...prev.fichas, [fid]: { ...(prev.fichas || {})[fid], [key]: val } },
      };
      saveLS(next);
      return next;
    });
    setDirty(true);
  }, []);

  const handleExport = useCallback(() => exportExcel(state), [state]);

  const filled = INSUMOS.filter(ins => parseFloat(((state.insumos || {})[ins.id] || {}).preco) > 0).length;
  const progress = Math.round(filled / INSUMOS.length * 100);

  if (!unlocked) return <PinScreen onUnlock={() => setUnlocked(true)} />;

  return (
    <div className="app-shell">
      <Header tab={tab} setTab={setTab} syncStatus={syncStatus} progress={progress} />
      <main style={{ flex:1, paddingBottom:90 }}>
        {tab === 'insumos' && <InsumosTab state={state} updateInsumo={updateInsumo} />}
        {tab === 'fichas'  && <FichasTab  state={state} updateFicha={updateFicha} />}
        {tab === 'resumo'  && <ResumoTab  state={state} />}
      </main>
      <Footer
        onSave={handleSave} onCancel={handleCancel} onExport={handleExport}
        dirty={dirty} lastSync={lastSync} syncStatus={syncStatus}
      />
      {confirmCancel && (
        <ConfirmModal
          message="Descartar todas as alterações não salvas?"
          onConfirm={handleConfirmCancel}
          onCancel={() => setConfirmCancel(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
